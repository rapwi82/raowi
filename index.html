<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Music by Welino</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      font-family: 'Segoe UI', sans-serif;
      color: white;
      overflow: hidden;
      background: #111;
    }

    #particles-js {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
    }

    .overlay {
      backdrop-filter: blur(4px);
      background-color: rgba(0, 0, 0, 0.6);
      width: 100%;
      height: 100%;
      position: absolute;
      top: 0;
      left: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .content {
      text-align: center;
      animation: fadeIn 1.5s ease;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .typing {
      font-size: 26px;
      font-weight: bold;
      color: #1DB954;
      border-right: 2px solid white;
      display: inline-block;
      white-space: nowrap;
      overflow: hidden;
      animation: typing 3s steps(25) 1s 1 normal both, blink .75s step-end infinite;
      margin-bottom: 20px;
    }

    @keyframes typing {
      from { width: 0 }
      to { width: 240px }
    }

    @keyframes blink {
      from, to { border-color: transparent }
      50% { border-color: white }
    }

    p {
      color: #ccc;
      margin: 10px 0 30px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px 20px;
      margin: 10px;
      border-radius: 50px;
      text-decoration: none;
      color: white;
      font-weight: bold;
      font-size: 16px;
      transition: 0.3s ease;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    .yt { background-color: #FF0000; }
    .yt:hover { transform: scale(1.08); background-color: #cc0000; }

    .spotify { background-color: #1DB954; }
    .spotify:hover { transform: scale(1.08); background-color: #158f46; }

    .button img {
      width: 24px;
      height: 24px;
    }

    .search-box {
      margin-top: 20px;
    }

    .search-box input {
      padding: 10px;
      border-radius: 20px;
      border: none;
      width: 200px;
      font-size: 14px;
      margin-right: 10px;
    }

    .search-box button {
      padding: 10px 18px;
      border-radius: 20px;
      border: none;
      background-color: #1DB954;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .search-box button:hover {
      background-color: #158f46;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 600px) {
      h1, .typing { font-size: 22px; }
      .button { font-size: 14px; padding: 10px 16px; }
      .search-box input { width: 150px; }
    }
  </style>
</head>
<body>

  <!-- Background Partikel -->
  <div id="particles-js"></div>

  <!-- Konten -->
  <div class="overlay">
    <div class="content">
      <div class="typing">Welcome To Favorit Song & Streamer</div>
      <p>Best Song And Streamer Yapping ✨</p>

      <a href="https://www.youtube.com/@welino" class="button yt" target="_blank">
        <img src="https://img.icons8.com/ios-filled/50/ffffff/youtube-play.png" alt="YouTube Icon">
        Welino
      </a>

      <a href="https://open.spotify.com/search/birds%20of%20a%20feather" class="button spotify" target="_blank">
        <img src="https://img.icons8.com/ios-filled/50/ffffff/spotify.png" alt="Spotify Icon">
        Bird Of Feather
      </a>

      <!-- SEARCHING -->
      <div class="search-box">
        <input type="text" id="spotifyQuery" placeholder="Cari lagu lain...">
        <button onclick="searchSpotify()">🔍 Cari</button>
      </div>
    </div>
  </div>

  <!-- Particles.js -->
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <script>
    particlesJS("particles-js", {
      "particles": {
        "number": { "value": 50 },
        "color": { "value": "#ffffff" },
        "shape": { "type": "circle" },
        "opacity": {
          "value": 0.3,
          "random": true
        },
        "size": {
          "value": 3,
          "random": true
        },
        "move": {
          "enable": true,
          "speed": 1.2
        }
      },
      "interactivity": {
        "events": {
          "onhover": { "enable": true, "mode": "repulse" }
        }
      }
    });

    // Searching ke Spotify
    function searchSpotify() {
      const query = document.getElementById('spotifyQuery').value.trim();
      if (query) {
        const encoded = encodeURIComponent(query);
        const url = `https://open.spotify.com/search/${encoded}`;
        window.open(url, '_blank');
      }
    }
  </script>

</body>
</html>
